<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#ffffff" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
  @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap");

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .app {
    max-width: 420px;
    margin: 0 auto;
    padding: 1rem;
    font-family: "Nunito", sans-serif;
    color: var(--color-text-primary);
  }

  .header {
    padding: 1.25rem 0 1rem;
    margin-bottom: 1rem;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .app-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--color-text-primary);
  }

  .app-title span {
    color: #d4537e;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    border: 0.5px solid;
  }

  .status-pill.online {
    background: #eaf3de;
    color: #27500a;
    border-color: #97c459;
  }

  .status-pill.offline {
    background: #fcebeb;
    color: #791f1f;
    border-color: #f09595;
  }

  .status-pill.connecting {
    background: #faeeda;
    color: #633806;
    border-color: #ef9f27;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .online .status-dot {
    background: #3b6d11;
  }

  .offline .status-dot {
    background: #e24b4a;
  }

  .connecting .status-dot {
    background: #ba7517;
  }

  .status-time {
    font-size: 12px;
    color: var(--color-text-tertiary);
    margin-top: 4px;
  }

  .alert-banner {
    display: none;
    padding: 10px 14px;
    border-radius: var(--border-radius-md);
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 12px;
    border: 0.5px solid;
  }

  .alert-banner.error {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fcebeb;
    color: #791f1f;
    border-color: #f09595;
  }

  .alert-banner.warning {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #faeeda;
    color: #633806;
    border-color: #ef9f27;
  }

  .alert-banner.success {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #eaf3de;
    color: #27500a;
    border-color: #97c459;
  }

  .alert-icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 12px;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .card-icon {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-icon.pink {
    background: #fbeaf0;
  }

  .card-icon.teal {
    background: #e1f5ee;
  }

  .card-icon.amber {
    background: #faeeda;
  }

  .card-icon.blue {
    background: #e6f1fb;
  }

  .card-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--color-text-secondary);
    letter-spacing: 0.03em;
  }

  .ip-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .ip-row input {
    flex: 1;
    font-family: "Nunito", sans-serif;
    font-size: 13px;
    padding: 8px 12px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    color: var(--color-text-primary);
  }

  .btn-connect {
    font-family: "Nunito", sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 16px;
    background: #d4537e;
    color: #fff;
    border: none;
    border-radius: var(--border-radius-md);
    cursor: pointer;
  }

  .btn-connect:hover {
    background: #993556;
  }

  .hint {
    font-size: 11px;
    color: var(--color-text-tertiary);
  }

  .camera-box {
    width: 100%;
    aspect-ratio: 4/3;
    background: #f1efe8;
    border-radius: var(--border-radius-md);
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
  }

  .camera-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  .camera-box img.active {
    display: block;
  }

  .cam-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .cam-placeholder-text {
    font-size: 12px;
    color: var(--color-text-tertiary);
    font-weight: 600;
  }

  .cam-controls {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .cam-btn {
    font-family: "Nunito", sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 8px;
    border-radius: var(--border-radius-md);
    cursor: pointer;
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
  }

  .cam-btn:hover {
    background: var(--color-background-primary);
  }

  .cam-btn.active {
    background: #e1f5ee;
    color: #085041;
    border-color: #5dcaa5;
  }

  .feed-btn {
    width: 100%;
    padding: 14px;
    font-family: "Nunito", sans-serif;
    font-size: 15px;
    font-weight: 700;
    background: #d4537e;
    color: #fff;
    border: none;
    border-radius: var(--border-radius-md);
    cursor: pointer;
    letter-spacing: 0.02em;
    transition:
      background 0.15s,
      transform 0.1s;
  }

  .feed-btn:active {
    transform: scale(0.98);
    background: #993556;
  }

  .feed-btn:disabled {
    background: #b4b2a9;
    cursor: not-allowed;
  }

  .portion-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 12px;
  }

  .portion-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--color-text-secondary);
    white-space: nowrap;
  }

  .portion-val {
    font-size: 13px;
    font-weight: 700;
    min-width: 28px;
    text-align: right;
    color: #d4537e;
  }

  .schedule-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }

  .schedule-item:last-child {
    border-bottom: none;
    padding-bottom: 0;
  }

  .schedule-time {
    font-size: 20px;
    font-weight: 700;
  }

  .schedule-meta {
    font-size: 11px;
    color: var(--color-text-tertiary);
    margin-top: 2px;
    font-weight: 600;
  }

  .schedule-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .del-btn {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #fcebeb;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .del-btn:hover {
    background: #f09595;
  }

  .toggle {
    width: 38px;
    height: 22px;
    border-radius: 11px;
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary);
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle.on {
    background: #d4537e;
    border-color: #d4537e;
  }

  .toggle::after {
    content: "";
    position: absolute;
    top: 3px;
    left: 3px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.2s;
  }

  .toggle.on::after {
    transform: translateX(16px);
  }

  .add-row {
    display: grid;
    grid-template-columns: 1fr 72px auto;
    gap: 8px;
    margin-top: 12px;
  }

  .add-row input {
    font-family: "Nunito", sans-serif;
    font-size: 13px;
    padding: 8px 10px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    color: var(--color-text-primary);
  }

  .btn-add {
    font-family: "Nunito", sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 14px;
    background: #eeedfe;
    color: #3c3489;
    border: 0.5px solid #afa9ec;
    border-radius: var(--border-radius-md);
    cursor: pointer;
    white-space: nowrap;
  }

  .btn-add:hover {
    background: #cecbf6;
  }

  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }

  .history-item:last-child {
    border-bottom: none;
  }

  .hist-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 20px;
  }

  .hist-manual {
    background: #fbeaf0;
    color: #72243e;
  }

  .hist-schedule {
    background: #e1f5ee;
    color: #085041;
  }

  .hist-time {
    font-size: 11px;
    color: var(--color-text-tertiary);
    font-weight: 600;
  }

  .hist-portion {
    font-size: 13px;
    font-weight: 700;
    color: var(--color-text-secondary);
  }

  .empty {
    font-size: 13px;
    color: var(--color-text-tertiary);
    padding: 10px 0;
    font-weight: 600;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 99;
    font-family: "Nunito", sans-serif;
  }

  .toast.success {
    background: #eaf3de;
    color: #27500a;
    border: 0.5px solid #97c459;
  }

  .toast.error {
    background: #fcebeb;
    color: #791f1f;
    border: 0.5px solid #f09595;
  }

  .toast.show {
    opacity: 1;
  }
</style>

<script>
  let API = "";
  let pingInterval = null;

  function getAPI() {
    return document.getElementById("ipInput").value.trim().replace(/\/$/, "");
  }

  function showToast(msg, type = "success") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast " + type + " show";
    setTimeout(() => t.classList.remove("show"), 2500);
  }

  function showAlert(msg, type = "error") {
    const b = document.getElementById("alertBanner");
    const tx = document.getElementById("alertText");
    b.className = "alert-banner " + type;
    tx.textContent = msg;
  }

  function hideAlert() {
    document.getElementById("alertBanner").style.display = "none";
    document.getElementById("alertBanner").className = "alert-banner";
  }

  function setStatus(state, label, time = "") {
    const pill = document.getElementById("statusPill");
    const lbl = document.getElementById("statusLabel");
    const tim = document.getElementById("statusTime");
    pill.className = "status-pill " + state;
    lbl.textContent = label;
    tim.textContent = time;
  }

  function fmtTime(iso) {
    const d = new Date(iso);
    return (
      d.toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" }) +
      " · " +
      d.toLocaleDateString("id-ID", { day: "numeric", month: "short" })
    );
  }

  async function getEspIP() {
    try {
      const r = await fetch(`${API}/api/esp-ip`, {
        signal: AbortSignal.timeout(3000),
      });
      const data = await r.json();
      return data.ip || null;
    } catch {
      return null;
    }
  }

  async function pingDevice() {
    try {
      const r = await fetch(`${API}/api/schedules`, {
        signal: AbortSignal.timeout(5000),
      });
      if (r.ok) {
        setStatus("online", "online", "terhubung · kamera offline");
        hideAlert();
        return true;
      }
    } catch (e) {
      setStatus("offline", "offline");
      showAlert("Backend tidak merespon — cek server atau tunnel URL", "error");
    }
    return false;
  }

  async function connectDevice() {
    API = getAPI();
    setStatus("connecting", "connecting");
    const ok = await pingDevice();
    if (ok) {
      showToast("terhubung ke backend");
      loadSchedules();
      loadHistory();
      clearInterval(pingInterval);
      pingInterval = setInterval(pingDevice, 10000);
    }
  }
  async function startStream() {
    const espIP = await getEspIP();
    if (!espIP) {
      showToast("IP ESP32 belum tersedia — pastiin ESP32 nyala", "error");
      return;
    }
    const img = document.getElementById("streamImg");
    const ph = document.getElementById("camPlaceholder");
    img.src = `http://${espIP}/stream?t=${Date.now()}`;
    img.classList.add("active");
    ph.style.display = "none";
    document.getElementById("btnStream").classList.add("active");
    img.onerror = () => {
      stopStream();
      showAlert("Stream gagal — pastiin kamera terhubung ke ESP32", "warning");
      showToast("stream gagal", "error");
    };
  }

  async function takeSnapshot() {
    const espIP = await getEspIP();
    if (!espIP) {
      showToast("IP ESP32 belum tersedia — pastiin ESP32 nyala", "error");
      return;
    }
    const img = document.getElementById("streamImg");
    const ph = document.getElementById("camPlaceholder");
    img.src = `http://${espIP}/api/snapshot?t=${Date.now()}`;
    img.classList.add("active");
    ph.style.display = "none";
    img.onerror = () => {
      img.classList.remove("active");
      ph.style.display = "";
      showAlert("Snapshot gagal — kamera mungkin tidak siap", "warning");
      showToast("snapshot gagal", "error");
    };
  }

  function stopStream() {
    const img = document.getElementById("streamImg");
    const ph = document.getElementById("camPlaceholder");
    img.src = "";
    img.classList.remove("active");
    ph.style.display = "";
    document.getElementById("btnStream").classList.remove("active");
  }

  async function manualFeed() {
    const portion = parseInt(document.getElementById("portionSlider").value);
    const btn = document.getElementById("feedBtn");
    btn.disabled = true;
    btn.textContent = "Memberi makan...";
    try {
      const r = await fetch(`${API}/api/feed/manual`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ portion }),
        signal: AbortSignal.timeout(15000),
      });
      if (r.ok) {
        showToast("Berhasil feed " + portion + "s");
        hideAlert();
        loadHistory();
      } else {
        showAlert("Feed gagal — server merespon tapi ada error", "error");
        showToast("feed gagal", "error");
      }
    } catch (e) {
      if (e.name === "TimeoutError") {
        showAlert("Feed timeout — server tidak merespon", "error");
        showToast("timeout", "error");
      } else {
        showAlert("Tidak bisa konek ke backend", "error");
        showToast("koneksi gagal", "error");
      }
    }
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = "Feed sekarang";
    }, 2000);
  }

  async function loadSchedules() {
    try {
      const r = await fetch(`${API}/api/schedules`, {
        signal: AbortSignal.timeout(5000),
      });
      const data = await r.json();
      const el = document.getElementById("scheduleList");
      if (!data.length) {
        el.innerHTML = '<p class="empty">belum ada jadwal</p>';
        return;
      }
      el.innerHTML = data
        .map(
          (s) => `
                <div class="schedule-item">
                    <div>
                        <div class="schedule-time">${s.time}</div>
                        <div class="schedule-meta">${s.portion}s per porsi</div>
                    </div>
                    <div class="schedule-right">
                        <button class="del-btn" onclick="deleteSchedule(${s.id})">
                            <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 2L8 8M8 2L2 8" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round"/></svg>
                        </button>
                        <div class="toggle ${s.is_active ? "on" : ""}" onclick="toggleSchedule(${s.id}, this)"></div>
                    </div>
                </div>
            `,
        )
        .join("");
    } catch {
      showAlert("Gagal load jadwal", "warning");
    }
  }

  async function addSchedule() {
    const time = document.getElementById("newTime").value;
    const portion = parseInt(document.getElementById("newPortion").value);
    if (!time || !portion) return;
    try {
      const r = await fetch(`${API}/api/schedules`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ time, portion }),
        signal: AbortSignal.timeout(5000),
      });
      if (r.ok) {
        showToast("Jadwal ditambahkan");
        loadSchedules();
      } else {
        showToast("gagal tambah jadwal", "error");
      }
    } catch {
      showToast("koneksi gagal", "error");
    }
  }

  async function toggleSchedule(id, el) {
    try {
      const r = await fetch(`${API}/api/schedules/${id}/toggle`, {
        method: "PATCH",
        signal: AbortSignal.timeout(5000),
      });
      const data = await r.json();
      el.classList.toggle("on", !!data.is_active);
      showToast(data.is_active ? "Jadwal aktif" : "Jadwal dinonaktifkan");
    } catch {
      showToast("gagal", "error");
    }
  }

  async function deleteSchedule(id) {
    try {
      await fetch(`${API}/api/schedules/${id}`, {
        method: "DELETE",
        signal: AbortSignal.timeout(5000),
      });
      showToast("Jadwal dihapus");
      loadSchedules();
    } catch {
      showToast("gagal hapus", "error");
    }
  }

  async function loadHistory() {
    try {
      const r = await fetch(`${API}/api/feed/history`, {
        signal: AbortSignal.timeout(5000),
      });
      if (!r.ok) return;
      const data = await r.json();
      const el = document.getElementById("historyList");
      if (!data.length) {
        el.innerHTML = '<p class="empty">belum ada history</p>';
        return;
      }
      el.innerHTML = data
        .slice(0, 8)
        .map(
          (h) => `
                <div class="history-item">
                    <span class="hist-badge hist-${h.type}">${h.type}</span>
                    <span class="hist-portion">${h.portion}s</span>
                    <span class="hist-time">${fmtTime(h.triggered_at)}</span>
                </div>
            `,
        )
        .join("");
    } catch {}
  }

  // auto-fetch tunnel URL saat load
  window.addEventListener("load", async () => {
    try {
      const r = await fetch("/api/tunnel-url");
      const data = await r.json();
      if (data.url) {
        API = data.url;
        document.getElementById("ipInput").value = data.url;
        connectDevice();
      }
    } catch {
      setStatus("offline", "offline");
    }
  });
</script>
